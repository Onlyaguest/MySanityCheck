<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>精力管理系统 - Demo 数据可视化</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
            background: #f5f5f7;
            color: #1d1d1f;
            line-height: 1.6;
            padding: 20px;
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
        }

        header {
            text-align: center;
            margin-bottom: 40px;
            padding: 40px 20px;
            background: white;
            border-radius: 12px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.1);
        }

        h1 {
            font-size: 36px;
            font-weight: 700;
            margin-bottom: 10px;
        }

        .subtitle {
            font-size: 18px;
            color: #86868b;
        }

        .day-card {
            background: white;
            border-radius: 12px;
            padding: 30px;
            margin-bottom: 30px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.1);
        }

        .day-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
            padding-bottom: 20px;
            border-bottom: 2px solid #f5f5f7;
        }

        .day-title {
            font-size: 24px;
            font-weight: 600;
        }

        .status-badge {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            padding: 8px 16px;
            border-radius: 20px;
            font-size: 14px;
            font-weight: 500;
        }

        .status-healthy {
            background: #d1f4e0;
            color: #0a7d3e;
        }

        .three-lines {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
            gap: 20px;
            margin-bottom: 30px;
        }

        .line-card {
            background: #f5f5f7;
            padding: 20px;
            border-radius: 8px;
        }

        .line-title {
            font-size: 14px;
            font-weight: 600;
            color: #86868b;
            margin-bottom: 10px;
        }

        .line-value {
            font-size: 32px;
            font-weight: 700;
            margin-bottom: 5px;
        }

        .line-change {
            font-size: 14px;
            color: #86868b;
        }

        .events-section {
            margin-bottom: 30px;
        }

        .section-title {
            font-size: 18px;
            font-weight: 600;
            margin-bottom: 15px;
        }

        .events-grid {
            display: grid;
            gap: 15px;
        }

        .event-item {
            display: flex;
            align-items: flex-start;
            gap: 12px;
            padding: 15px;
            background: #f5f5f7;
            border-radius: 8px;
        }

        .event-emoji {
            font-size: 24px;
            flex-shrink: 0;
        }

        .event-content {
            flex: 1;
        }

        .event-time {
            font-size: 12px;
            color: #86868b;
            margin-bottom: 4px;
        }

        .event-text {
            font-size: 14px;
            margin-bottom: 4px;
        }

        .event-note {
            font-size: 12px;
            color: #86868b;
            font-style: italic;
        }

        .event-points {
            font-size: 18px;
            font-weight: 600;
            flex-shrink: 0;
        }

        .points-positive {
            color: #0a7d3e;
        }

        .points-negative {
            color: #d1180b;
        }

        .top-drains {
            background: #fff3cd;
            padding: 20px;
            border-radius: 8px;
            margin-bottom: 30px;
        }

        .drain-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 10px 0;
            border-bottom: 1px solid #ffeaa7;
        }

        .drain-item:last-child {
            border-bottom: none;
        }

        .drain-rank {
            font-size: 24px;
            font-weight: 700;
            color: #856404;
            margin-right: 15px;
        }

        .drain-info {
            flex: 1;
        }

        .drain-event {
            font-size: 14px;
            font-weight: 600;
            margin-bottom: 4px;
        }

        .drain-note {
            font-size: 12px;
            color: #856404;
        }

        .drain-points {
            font-size: 18px;
            font-weight: 700;
            color: #d1180b;
        }

        .insights-list {
            list-style: none;
            padding: 0;
        }

        .insights-list li {
            padding: 10px 15px;
            margin-bottom: 8px;
            background: #e8f5e9;
            border-left: 4px solid #0a7d3e;
            border-radius: 4px;
            font-size: 14px;
        }

        .suggestions-list {
            list-style: none;
            padding: 0;
        }

        .suggestions-list li {
            padding: 10px 15px;
            margin-bottom: 8px;
            background: #e3f2fd;
            border-left: 4px solid #1976d2;
            border-radius: 4px;
            font-size: 14px;
        }

        .legend {
            background: white;
            padding: 30px;
            border-radius: 12px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.1);
            margin-top: 30px;
        }

        .legend-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 20px;
            margin-top: 20px;
        }

        .legend-item {
            padding: 15px;
            background: #f5f5f7;
            border-radius: 8px;
        }

        .legend-title {
            font-size: 14px;
            font-weight: 600;
            margin-bottom: 10px;
        }

        .legend-value {
            font-size: 12px;
            color: #86868b;
        }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <h1>⚡ 精力管理系统</h1>
            <p class="subtitle">基于真实数据的 Demo 可视化（2026-03-09 至 2026-03-10）</p>
        </header>

        <div id="days-container"></div>

        <div class="legend">
            <h2 class="section-title">📊 精力汇率规则</h2>
            <div class="legend-grid" id="legend-container"></div>
        </div>
    </div>

    <script>
        // 加载 JSON 数据
        fetch('sample-data.json')
            .then(response => response.json())
            .then(data => {
                renderDays(data.days);
                renderLegend(data.energy_rate_rules);
            })
            .catch(error => console.error('Error loading data:', error));

        function renderDays(days) {
            const container = document.getElementById('days-container');
            
            days.forEach(day => {
                const dayCard = document.createElement('div');
                dayCard.className = 'day-card';
                
                dayCard.innerHTML = `
                    <div class="day-header">
                        <div class="day-title">${day.date} ${day.day_of_week}</div>
                        <div class="status-badge status-healthy">
                            <span>${day.energy_line.status_emoji}</span>
                            <span>${day.energy_line.status}</span>
                        </div>
                    </div>

                    <div class="three-lines">
                        <div class="line-card">
                            <div class="line-title">⚡ 精力线</div>
                            <div class="line-value">${day.energy_line.final}/100</div>
                            <div class="line-change">净变化: ${day.energy_line.net_change}</div>
                        </div>
                        <div class="line-card">
                            <div class="line-title">⏰ 时间线</div>
                            <div class="line-value">${day.time_line.screen_time_hours ? day.time_line.screen_time_hours.toFixed(1) + 'h' : 'N/A'}</div>
                            <div class="line-change">屏幕使用时间</div>
                        </div>
                        <div class="line-card">
                            <div class="line-title">😊 心情线</div>
                            <div class="line-value">${day.mood_line.average}/100</div>
                            <div class="line-change">${day.mood_line.note}</div>
                        </div>
                    </div>

                    <div class="events-section">
                        <div class="section-title">⚡ 充电事件</div>
                        <div class="events-grid">
                            ${day.events.charging.map(event => `
                                <div class="event-item">
                                    <div class="event-emoji">${event.emoji}</div>
                                    <div class="event-content">
                                        <div class="event-time">${event.time}</div>
                                        <div class="event-text">${event.event}</div>
                                        ${event.note ? `<div class="event-note">${event.note}</div>` : ''}
                                    </div>
                                    <div class="event-points points-positive">+${event.points}</div>
                                </div>
                            `).join('')}
                        </div>
                    </div>

                    <div class="events-section">
                        <div class="section-title">🔋 放电事件</div>
                        <div class="events-grid">
                            ${day.events.draining.map(event => `
                                <div class="event-item">
                                    <div class="event-emoji">${event.emoji}</div>
                                    <div class="event-content">
                                        <div class="event-time">${event.time}</div>
                                        <div class="event-text">${event.event}</div>
                                        ${event.note ? `<div class="event-note">${event.note}</div>` : ''}
                                    </div>
                                    <div class="event-points points-negative">${event.points}</div>
                                </div>
                            `).join('')}
                        </div>
                    </div>

                    <div class="top-drains">
                        <div class="section-title">🔥 Top 3 漏电点</div>
                        ${day.top_drains.map(drain => `
                            <div class="drain-item">
                                <div class="drain-rank">#${drain.rank}</div>
                                <div class="drain-info">
                                    <div class="drain-event">${drain.event}</div>
                                    <div class="drain-note">${drain.note}</div>
                                </div>
                                <div class="drain-points">${drain.points} (${drain.percentage}%)</div>
                            </div>
                        `).join('')}
                    </div>

                    <div class="events-section">
                        <div class="section-title">💡 洞察</div>
                        <ul class="insights-list">
                            ${day.insights.map(insight => `<li>${insight}</li>`).join('')}
                        </ul>
                    </div>

                    <div class="events-section">
                        <div class="section-title">📝 明日建议</div>
                        <ul class="suggestions-list">
                            ${day.tomorrow_suggestions.map(suggestion => `<li>${suggestion}</li>`).join('')}
                        </ul>
                    </div>
                `;
                
                container.appendChild(dayCard);
            });
        }

        function renderLegend(rules) {
            const container = document.getElementById('legend-container');
            
            // 充电事件
            const chargingHtml = Object.entries(rules.charging_events).map(([category, events]) => `
                <div class="legend-item">
                    <div class="legend-title">⚡ ${category}</div>
                    ${Object.entries(events).map(([event, points]) => `
                        <div class="legend-value">${event}: +${points}</div>
                    `).join('')}
                </div>
            `).join('');
            
            // 放电事件
            const drainingHtml = Object.entries(rules.draining_events).map(([category, events]) => `
                <div class="legend-item">
                    <div class="legend-title">🔋 ${category}</div>
                    ${Object.entries(events).map(([event, points]) => `
                        <div class="legend-value">${event}: ${points}</div>
                    `).join('')}
                </div>
            `).join('');
            
            container.innerHTML = chargingHtml + drainingHtml;
        }
    </script>
</body>
</html>
